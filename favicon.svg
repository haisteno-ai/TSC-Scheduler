<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#100000"/>
  
  <!-- Door frame -->
  <rect x="140" y="80" width="232" height="352" rx="10" fill="#2a1010"/>
  
  <!-- Open gap (left sliver) - green glow -->
  <rect x="148" y="92" width="24" height="328" rx="3" fill="#22c55e" opacity="0.6"/>
  
  <!-- Door panel (shifted right to show the gap) -->
  <rect x="180" y="92" width="180" height="328" rx="6" fill="#e0ddd8"/>
  
  <!-- Door panel inner bevel -->
  <rect x="198" y="120" width="144" height="272" rx="4" fill="none" stroke="#c0bbb5" stroke-width="3" opacity="0.5"/>
  
  <!-- Door handle -->
  <circle cx="336" cy="268" r="11" fill="#665544"/>
  <circle cx="336" cy="268" r="6" fill="#100000" opacity="0.4"/>
  
  <!-- Green status dot - top right -->
  <circle cx="408" cy="104" r="40" fill="#22c55e"/>
</svg>
